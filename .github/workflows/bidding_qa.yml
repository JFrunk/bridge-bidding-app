name: Bidding QA Pipeline

on:
  push:
    branches:
      - development
      - 'feature/bidding-*'
    paths:
      - 'backend/engine/**'
      - 'backend/qa/**'
      - 'backend/data/ground_truth/**'
  pull_request:
    branches:
      - main
      - development

jobs:
  qa-suite:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests (QA Pipeline)
      working-directory: backend
      run: |
        python -m pytest tests/unit/test_qa_pipeline.py tests/unit/test_nltc.py -v

    - name: Run Ground Truth Suite
      working-directory: backend
      run: |
        python -m qa.run_qa suite \
          --data data/ground_truth/ \
          --output /tmp/qa_ground_truth_results.json \
          --fail-under 0.0

    - name: Upload QA Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qa-results
        path: /tmp/qa_ground_truth_results.json
        retention-days: 30
