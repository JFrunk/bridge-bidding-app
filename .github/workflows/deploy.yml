name: BridgeBuddy CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: /opt/bridge-bidding-app

      - name: Deploy and run QA on staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/bridge-bidding-app/backend
            bash update.sh
            python3 test_play_quality_integrated.py --automated

  production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: staging
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: /opt/bridge-bidding-app

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/bridge-bidding-app/backend
            bash update.sh
